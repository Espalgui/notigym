<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NotiGym — Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e8e8ed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 320px; }
    .icon {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255, 59, 48, 0.1);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon svg { width: 40px; height: 40px; color: #ff3b30; }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #8e8e93; line-height: 1.5; margin-bottom: 1.5rem; }
    button {
      background: #ff3b30; color: white; border: none;
      padding: 0.75rem 2rem; border-radius: 12px;
      font-size: 0.875rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728M12 9v4m0 4h.01" />
      </svg>
    </div>
    <h1>Hors ligne</h1>
    <p>Tu n'es pas connecté à Internet. Vérifie ta connexion et réessaie.</p>
    <button onclick="window.location.reload()">Réessayer</button>
  </div>
</body>
</html>
